site_name: Meal Prep
site_description: Solo vegetarian meal prep system — Hyderabad monsoon edition
theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
nav:
  - Home: index.md
  - Plan:
      - How the System Works: plan/system.md
      - Weekly Variations: plan/variations.md
      - Storage Cheat Sheet: plan/storage-cheatsheet.md
      - Shopping Lists: plan/shopping.md
      - Freezer Guide: plan/freezer-portioning.md
  - Weekend Prep Components:
      - Onion-Tomato Masala Base: recipes/onion-tomato-masala-base.md
      - Plain-Boiled Legumes: recipes/plain-boiled-legumes.md
      - Boiled Dal + Fresh Tadka: recipes/plain-boiled-dal-fresh-tadka.md
      - Boiled Potatoes: recipes/boiled-potatoes.md
      - Chopped Veggie Boxes: recipes/chopped-veggie-boxes.md
      - Home Curd: recipes/home-curd.md
      - Monsoon-Safe Sprouts: recipes/monsoon-safe-sprouts.md
      - Batch Rotis / Theplas: recipes/batch-rotis-theplas.md
      - Sambar-Style Dal: recipes/sambar-style-dal.md
  - Weekday Dishes:
      - Soya Bhurji: recipes/soya-bhurji.md
      - Matar Paneer: recipes/matar-paneer.md
      - Lauki Kootu: recipes/lauki-kootu.md
      - Pav Bhaji: recipes/pav-bhaji.md
      - Kadai Vegetable: recipes/kadai-vegetable.md
      - Dalia Pulao: recipes/daliya-pulao.md
      - Potato Pulao: recipes/potato-pulao.md
      - Ven/Kara Pongal: recipes/ven-pongal.md
  - Fresh Recipes:
      - Fresh Rotis: recipes/fresh-rotis.md
      - Aloo Pyaaz Tamatar Sabzi: recipes/aloo-pyaaz-tamatar-sabzi.md
      - Aloo-Pyaaz-Tamatar Jhol Wali Sabji: recipes/aloo-pyaaz-tamatar-jhol.md
      - Gawar Pyaaz Tamatar Masala: recipes/gawar-pyaaz-tamatar-masala.md
      - Standalone Gawar Masala Sabji: recipes/standalone-gawar-masala-sabji.md
      - Gawar Dal Sabji: recipes/gawar-dal-sabji.md
      - Gawar Tomato Jhol Sabji: recipes/gawar-tomato-jhol-sabji.md
      - Gawar Mangodi Sabji: recipes/gawar-mangodi-sabji.md
      - Gawar Aloo Lipta Masala Sabji: recipes/gawar-aloo-lipta-masala-sabji.md
      - Plain Moong Dal (Dhuli + Chhilka): recipes/plain-moong-dal-mix.md
      - Onion Green Chilli Poha: recipes/onion-green-chilli-poha.md
      - Masala Oats: recipes/masala-oats.md
      - One-Pot Masala Pasta: recipes/one-pot-masala-pasta.md
      - Steamed Idli: recipes/steamed-idli.md
      - One-Pot Thin Dal Sambar for Idli: recipes/one-pot-thin-dal-sambar-for-idli.md
      - Fresh Coconut, Peanut and Roasted Chana Chutney: recipes/fresh-coconut-peanut-roasted-chana-chutney.md
plugins:
  - search
markdown_extensions:
  - tables
  - admonition
